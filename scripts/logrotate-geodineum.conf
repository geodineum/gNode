#===============================================================================
# Geodineum Ecosystem - Unified Logrotate Configuration
#===============================================================================
# Manages rotation for all logs under /var/log/geodineum/
#
# Install: sudo cp logrotate-geodineum.conf /etc/logrotate.d/geodineum
# Test:    sudo logrotate -d /etc/logrotate.d/geodineum
# Force:   sudo logrotate -f /etc/logrotate.d/geodineum
#
# Centralizes Geodineum component logs under /var/log/geodineum/.
#===============================================================================

#-------------------------------------------------------------------------------
# gNode Daemon Logs (Rust)
#-------------------------------------------------------------------------------
/var/log/geodineum/gnode/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    copytruncate
    # copytruncate: Copy the log file, then truncate the original
    # This allows rotation without requiring the daemon to reopen the file
    # The daemon still receives USR1 but it's informational only
    sharedscripts
    postrotate
        # Signal gNode daemon that rotation occurred (informational)
        systemctl kill -s USR1 gnode-daemon.service 2>/dev/null || true
    endscript
}

#-------------------------------------------------------------------------------
# gNode Client Logs (PHP)
#-------------------------------------------------------------------------------
/var/log/geodineum/gnode-client/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 640 www-data gnode
}

#-------------------------------------------------------------------------------
# gCore Framework Logs
#-------------------------------------------------------------------------------
/var/log/geodineum/gcore/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 640 www-data gnode
}

#-------------------------------------------------------------------------------
# gCore Manager Logs (Per-Site)
#-------------------------------------------------------------------------------
/var/log/geodineum/gcore/sites/*/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 640 www-data gnode
    # Use dateext for easier identification
    dateext
    dateformat -%Y%m%d
}

#-------------------------------------------------------------------------------
# Theme Logs
#-------------------------------------------------------------------------------
/var/log/geodineum/themes/*/*.log
/var/log/geodineum/themes/*/sites/*/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 640 www-data gnode
    dateext
    dateformat -%Y%m%d
}

#-------------------------------------------------------------------------------
# WordPress Debug Logs
#-------------------------------------------------------------------------------
/var/log/geodineum/wordpress/*/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 640 www-data gnode
    dateext
    dateformat -%Y%m%d
}

#-------------------------------------------------------------------------------
# Apache Access Logs
#-------------------------------------------------------------------------------
/var/log/geodineum/apache/*/access.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 640 www-data gnode
    sharedscripts
    postrotate
        # Signal Apache to reopen log files
        if [ -f /var/run/apache2/apache2.pid ]; then
            /usr/sbin/apache2ctl graceful > /dev/null 2>&1 || true
        fi
    endscript
}

#-------------------------------------------------------------------------------
# Apache Error Logs
#-------------------------------------------------------------------------------
/var/log/geodineum/apache/*/error.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 640 www-data gnode
    sharedscripts
    postrotate
        # Signal Apache to reopen log files
        if [ -f /var/run/apache2/apache2.pid ]; then
            /usr/sbin/apache2ctl graceful > /dev/null 2>&1 || true
        fi
    endscript
}

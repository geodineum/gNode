# 5. Backup Strategy:
#    - RDB snapshots: /var/lib/valkey/gnode-dump.rdb
#    - AOF file: /var/lib/valkey/gnode-appendonly.aof
#    - Back up both files regularly
#
# 6. Monitoring:
#    - Health: valkey-cli PING
#    - Stats: valkey-cli INFO
#    - Slow queries: valkey-cli SLOWLOG GET 10
#    - Memory: valkey-cli MEMORY DOCTOR
#    - Latency: valkey-cli LATENCY DOCTOR

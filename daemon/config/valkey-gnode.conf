################################################################################
# gNode-Optimized ValKey Configuration
# Purpose: Dedicated ValKey instance for gNode (Geodineum Service Daemon)
# Security: Hardened for localhost-only access with strong authentication
# Performance: Tuned for stream-based operations and high throughput
################################################################################

################################################################################
# NETWORK & SECURITY
################################################################################

# Bind to localhost ONLY - gNode daemon and clients must be on same machine
# This is the primary security layer preventing external access
bind 127.0.0.1 ::1

# Protected mode: Refuse connections if no password is set
# Keep enabled as defense-in-depth even with requirepass
protected-mode yes

# gNode ValKey port (non-standard for security isolation)
# Must match --redis-port in daemon config and all scripts
port 47445

# Close idle connections after N seconds (0 = disabled)
# gNode maintains persistent connections, but clean up abandoned clients
timeout 300

# TCP listen() backlog - queue of pending connections
# Increase for high client connection rates
tcp-backlog 511

# TCP keepalive - send TCP ACKs to detect dead peers
# Send every 60 seconds (default: 300)
tcp-keepalive 60

# Max simultaneous client connections
# gNode daemon + PHP clients + monitoring tools
# Adjust based on your deployment size
maxclients 1000

################################################################################
# AUTHENTICATION & AUTHORIZATION
################################################################################

# IMPORTANT: Set a strong password before deploying to production
# Generate strong password: valkey-cli ACL GENPASS
# This will be automatically set by gNode setup scripts
requirepass CHANGE_ME_TO_STRONG_PASSWORD

# ACL configuration file (optional - for multi-user scenarios)
# Uncomment and configure if you need granular user permissions
aclfile /etc/valkey/users.acl

# ACL security log - track failed authentication attempts
acllog-max-len 256

################################################################################
# DATA PERSISTENCE
################################################################################

# Persistence strategy for gNode:
# - Streams are ephemeral (trimmed regularly)
# - Topology data is critical (must persist)
# - Format definitions are critical (must persist)
# - Load metrics are transient (can be lost)
#
# We use both RDB (snapshots) and AOF (append-only file) for durability

# RDB: Point-in-time snapshots
# Save if: 1+ keys changed in 900s, 10+ in 300s, 10000+ in 60s
save 900 1
save 300 10
save 60 10000

# RDB filename
dbfilename gnode-dump.rdb

# Enable RDB compression (CPU vs disk tradeoff)
rdbcompression yes

# Add CRC64 checksum to RDB files (integrity verification)
rdbchecksum yes

# AOF: Append-only file for write durability
appendonly yes

# AOF filename
appendfilename "gnode-appendonly.aof"

# AOF fsync strategy:
# - always: safest, slowest (fsync every write)
# - everysec: good compromise (fsync every second) - RECOMMENDED
# - no: fastest, least safe (OS decides when to fsync)
appendfsync everysec

# Disable fsync during AOF rewrite (prevent fsync storms)
no-appendfsync-on-rewrite no

# AOF rewrite trigger: when AOF is 100% larger than base size
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Enable RDB-AOF mixed persistence format (fast restart + durability)
aof-use-rdb-preamble yes

# Data directory - must be writable by valkey user
dir /var/lib/valkey

################################################################################
# MEMORY MANAGEMENT
################################################################################

# Maximum memory allocation
# gNode workload: topology data + stream buffers + format schemas
# Adjust based on your server capacity and service count
# Example: 2GB for ~10K services, 4GB for ~50K services
maxmemory 2gb

# Eviction policy when maxmemory is reached
# gNode recommendation: volatile-lru
#   - Evicts least recently used keys with TTL set
#   - Protects critical data (topology, formats) without TTL
#   - Allows streams (with TTL from XTRIM) to be evicted
#   - Health metrics naturally expire (TTL-based)
maxmemory-policy volatile-lru

# Sample size for eviction algorithms (higher = more accurate, more CPU)
maxmemory-samples 5

# Enable asynchronous memory freeing during eviction (reduces latency)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

################################################################################
# PERFORMANCE TUNING
################################################################################

# Number of logical databases
# gNode uses database 0 by default (multi-tenancy via key prefixes)
databases 16

# I/O threading for multi-core performance
# Enables multi-threaded I/O for network reads/writes
# Recommended: (num_cores / 2) up to 8 threads
# For 4 cores: use 2-3 threads
# For 8+ cores: use 4-6 threads
io-threads 4
io-threads-do-reads yes

# Lua scripting timeout (milliseconds)
# gNode ValKey functions should complete quickly
# 5000ms = 5 seconds (safety timeout)
lua-time-limit 5000

# Disable active rehashing (use spare cycles for background rehashing)
# Enable for more consistent latency
activerehashing yes

# Client output buffer limits
# gNode uses streams, which can generate large responses
# Format: <class> <hard-limit> <soft-limit> <soft-seconds>
# normal: PHP clients reading streams
client-output-buffer-limit normal 256mb 128mb 60
# replica: if you ever set up replication
client-output-buffer-limit replica 512mb 256mb 60
# pubsub: broadcast stream pattern (not traditional pubsub)
client-output-buffer-limit pubsub 64mb 32mb 60

################################################################################
# STREAM OPTIMIZATION
################################################################################

# Stream trimming defaults (can be overridden per-stream)
# gNode streams are auto-trimmed by daemon, these are fallback limits

# Max stream length before forced trimming
# gNode unified stream default: 10000
# gNode broadcast stream: time-based (300s)
stream-node-max-bytes 4096
stream-node-max-entries 100

################################################################################
# LOGGING & MONITORING
################################################################################

# Log verbosity levels: debug, verbose, notice, warning, nothing
# Production: notice (standard logging)
# Debugging: verbose or debug
loglevel notice

# Log destination
# Empty string = stdout (captured by systemd)
# Path = write to file (ensure valkey user can write)
logfile /var/log/valkey/gnode-valkey.log

# Always show logo on startup
always-show-logo no

# Hide sensitive user data (passwords, keys) from logs
# IMPORTANT: Keep enabled for security compliance
hide-user-data-from-log yes

# Slow query log - track slow commands
# Log commands taking longer than N microseconds
# 10000 = 10ms (adjust based on your latency requirements)
slowlog-log-slower-than 10000

# Keep last N slow commands in memory
slowlog-max-len 256

################################################################################
# ADVANCED TUNING
################################################################################

# Hash data structure optimization (space vs speed)
# gNode uses hashes for topology storage
hash-max-listpack-entries 512
hash-max-listpack-value 64

# List (stream) data structure optimization
list-max-listpack-size -2
list-compress-depth 0

# Set data structure optimization
set-max-intset-entries 512
set-max-listpack-entries 128
set-max-listpack-value 64

# Sorted set optimization (used internally by streams)
zset-max-listpack-entries 128
zset-max-listpack-value 64

# HyperLogLog sparse representation limit
hll-sparse-max-bytes 3000

# Active memory defragmentation (reduces fragmentation over time)
# Enable for long-running instances
activedefrag yes

# Defragmentation thresholds and cycle configuration
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-ignore-bytes 100mb
active-defrag-cycle-min 5
active-defrag-cycle-max 75

# Don't defrag small allocations
active-defrag-max-scan-fields 1000

################################################################################
# LATENCY MONITORING
################################################################################

# Track events that cause latency spikes
# Threshold in milliseconds (0 = disabled)
# 100ms = track events taking longer than 100ms
latency-monitor-threshold 100

################################################################################
# NOTIFICATIONS (for gNode broadcast pattern)
################################################################################

# Keyspace notifications configuration
# gNode can use these for real-time updates
# K = keyspace events, E = keyevent events, A = all commands
# x = expired events, e = evicted events
# Format: notify-keyspace-events KEA
# Default: disabled (enable if gNode uses keyspace notifications)
notify-keyspace-events ""

################################################################################
# REPLICATION (disabled by default - enable for HA setup)
################################################################################

# Uncomment and configure if you set up ValKey replication
# replicaof <masterip> <masterport>
# masterauth <master-password>

# Replica serves queries during sync (can serve stale data)
replica-serve-stale-data yes

# Replica is read-only (prevent writes to replica)
replica-read-only yes

# Diskless replication (stream RDB to replica without disk I/O)
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-sync-max-replicas 0

################################################################################
# SECURITY HARDENING
################################################################################

# NOTE: rename-command directives removed. ACL handles command restrictions now.
# The gnode_daemon ACL user has -@dangerous which excludes CONFIG, SHUTDOWN, DEBUG, etc.
# Per-site client ACLs restrict commands to only what each client needs.
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""
# rename-command SHUTDOWN SHUTDOWN_GNODE_SECURE

# Uncomment to disable additional commands
# rename-command DEBUG ""
# rename-command KEYS ""


# Service Topology Schema — 30D (25 discovery + 5 storage)
# Tier: LOCAL SERVICE — per-site service registration and discovery
# Used by: register-tools --tier service, gNode-Client getCapabilitySchema()
# Replaces: capability_schema.yaml (23D) — clean break, pre-release
#
# Each dimension maps human-readable names to normalized [0.0, 1.0] coordinates.
# Discovery dimensions (0-24) are used for spatial hash bucket keys.
# Storage dimensions (25-29) are persisted but not hashed.

schema_version: "3.0"
tier: service
total_dimensions: 30
discovery_dimensions: 25

dimensions:
  # ═══════════════════════════════════════════════════════════════
  # Layer 1: Interface Identity (0-3) — How to communicate
  # ═══════════════════════════════════════════════════════════════

  protocol:
    index: 0
    query_type: equality
    values:
      undefined: 0.00
      http_rest: 0.10
      graphql: 0.20
      grpc: 0.30
      websocket: 0.40
      gnode_stream: 0.50
      resp3_direct: 0.60
      amqp: 0.70
      kafka: 0.80
      custom_tcp: 0.90

  native_format:
    index: 1
    query_type: informational
    values:
      undefined: 0.00
      plaintext: 0.10
      json: 0.20
      xml: 0.30
      yaml: 0.40
      msgpack: 0.50
      protobuf: 0.60
      cbor: 0.70
      resp3: 0.80
      custom_binary: 0.90

  api_version:
    index: 2
    query_type: equality
    values:
      v1: 0.10
      v2: 0.20
      v3: 0.30
      v4: 0.40
      v5: 0.50

  contract_stability:
    index: 3
    query_type: range
    values:
      experimental: 0.00
      alpha: 0.25
      beta: 0.50
      stable: 0.75
      frozen: 1.00

  # ═══════════════════════════════════════════════════════════════
  # Layer 2: Access Control (4-6) — Who can use it
  # ═══════════════════════════════════════════════════════════════

  clearance_required:
    index: 4
    query_type: range
    values:
      public: 0.00
      authenticated: 0.20
      authorized: 0.40
      privileged: 0.60
      confidential: 0.80
      classified: 1.00

  auth_method:
    index: 5
    query_type: equality
    values:
      none: 0.00
      api_key: 0.20
      bearer_token: 0.40
      session_cookie: 0.60
      mtls: 0.80
      hardware_token: 1.00

  data_sensitivity:
    index: 6
    query_type: range
    values:
      public_data: 0.00
      internal: 0.25
      confidential: 0.50
      pii: 0.75
      regulated: 1.00

  # ═══════════════════════════════════════════════════════════════
  # Layer 3: Service Scope (7) — Where it runs
  # ═══════════════════════════════════════════════════════════════

  service_scope:
    index: 7
    query_type: equality
    values:
      infrastructure: 0.00
      daemon: 0.15
      worker: 0.30
      cron_scheduled: 0.45
      internal_api: 0.60
      bff: 0.75
      client_facing: 0.90
      edge: 1.00

  # ═══════════════════════════════════════════════════════════════
  # Layer 4: Functional Domain (8-10) — What it does
  # ═══════════════════════════════════════════════════════════════

  domain_primary:
    index: 8
    query_type: proximity
    values:
      platform: 0.05
      identity: 0.10
      configuration: 0.15
      storage: 0.20
      cache: 0.25
      compute: 0.30
      transform: 0.35
      messaging: 0.40
      workflow: 0.45
      template: 0.50
      content: 0.55
      gateway: 0.60
      integration: 0.65
      analytics: 0.70
      logging: 0.75
      ml_inference: 0.80
      search: 0.85
      notification: 0.90
      presentation: 0.95

  domain_secondary:
    index: 9
    query_type: proximity
    values:
      platform: 0.05
      identity: 0.10
      configuration: 0.15
      storage: 0.20
      cache: 0.25
      compute: 0.30
      transform: 0.35
      messaging: 0.40
      workflow: 0.45
      template: 0.50
      content: 0.55
      gateway: 0.60
      integration: 0.65
      analytics: 0.70
      logging: 0.75
      ml_inference: 0.80
      search: 0.85
      notification: 0.90
      presentation: 0.95

  specialization:
    index: 10
    query_type: range
    values:
      platform: 0.00
      generalist: 0.25
      focused: 0.50
      specialist: 0.75
      single_purpose: 1.00

  # ═══════════════════════════════════════════════════════════════
  # Layer 5: Performance Profile (11-13) — How fast / reliable
  # ═══════════════════════════════════════════════════════════════

  throughput_tier:
    index: 11
    query_type: range
    values:
      minimal: 0.00
      standard: 0.25
      professional: 0.50
      enterprise: 0.75
      hyperscale: 1.00

  latency_class:
    index: 12
    query_type: range
    values:
      realtime: 0.00
      interactive: 0.25
      responsive: 0.50
      patient: 0.75
      batch: 1.00

  reliability_tier:
    index: 13
    query_type: range
    values:
      best_effort: 0.00
      standard: 0.25
      high: 0.50
      critical: 0.75
      ultra: 1.00

  # ═══════════════════════════════════════════════════════════════
  # Layer 6: Workflow Context (14-15) — Pipeline position
  # ═══════════════════════════════════════════════════════════════

  pipeline_stage:
    index: 14
    query_type: equality
    values:
      source: 0.00
      ingest: 0.20
      process: 0.40
      enrich: 0.60
      deliver: 0.80
      sink: 1.00

  execution_priority:
    index: 15
    query_type: range
    values:
      background: 0.00
      low: 0.25
      normal: 0.50
      high: 0.75
      critical: 1.00

  # ═══════════════════════════════════════════════════════════════
  # Layer 7: Runtime State (16-18) — Dynamic, updated at runtime
  # ═══════════════════════════════════════════════════════════════

  current_load:
    index: 16
    query_type: range
    dynamic: true
    values:
      idle: 0.00
      light: 0.25
      moderate: 0.50
      heavy: 0.75
      saturated: 1.00

  health_status:
    index: 17
    query_type: range
    dynamic: true
    values:
      dead: 0.00
      degraded: 0.33
      healthy: 0.67
      unknown: 1.00

  lifecycle_state:
    index: 18
    query_type: equality
    dynamic: true
    values:
      registering: 0.00
      active: 0.25
      draining: 0.50
      stopped: 0.75
      failed: 1.00

  # ═══════════════════════════════════════════════════════════════
  # Layer 8: Classification (19-21) — What kind of thing
  # ═══════════════════════════════════════════════════════════════

  service_tier:
    index: 19
    query_type: equality
    values:
      tool: 0.10
      service: 0.30
      pipeline: 0.50
      infrastructure: 0.70
      orchestrator: 0.90

  environment:
    index: 20
    query_type: equality
    values:
      global: 0.00
      testing: 0.25
      staging: 0.50
      acceptance: 0.75
      production: 1.00

  implementation_language:
    index: 21
    query_type: equality
    values:
      rust: 0.15
      php: 0.30
      lua: 0.45
      python: 0.55
      go: 0.65
      javascript: 0.75
      bash: 0.90

  # ═══════════════════════════════════════════════════════════════
  # Layer 9: Network Context (22-24) — Where it lives, how it persists
  # ═══════════════════════════════════════════════════════════════

  network_zone:
    index: 22
    query_type: equality
    values:
      localhost: 0.00
      vpn: 0.25
      internal: 0.50
      dmz: 0.75
      public: 1.00

  data_persistence:
    index: 23
    query_type: equality
    values:
      stateless: 0.00
      ephemeral: 0.33
      persistent: 0.67
      replicated: 1.00

  update_channel:
    index: 24
    query_type: equality
    values:
      stable: 0.00
      beta: 0.33
      canary: 0.67
      pinned: 1.00

  # ═══════════════════════════════════════════════════════════════
  # Layer 10: Visual Topology (25-27) — Storage-only, for rendering
  # ═══════════════════════════════════════════════════════════════

  user_x:
    index: 25
    storage_only: true
    values:
      left: 0.00
      center: 0.50
      right: 1.00

  user_y:
    index: 26
    storage_only: true
    values:
      bottom: 0.00
      middle: 0.50
      top: 1.00

  user_z:
    index: 27
    storage_only: true
    values:
      back: 0.00
      center: 0.50
      front: 1.00

  # ═══════════════════════════════════════════════════════════════
  # Layer 11: Metadata (28-29) — Storage-only
  # ═══════════════════════════════════════════════════════════════

  deployment_model:
    index: 28
    storage_only: true
    values:
      bare_metal: 0.00
      container: 0.33
      serverless: 0.67
      embedded: 1.00

  registration_order:
    index: 29
    storage_only: true
    values:
      first: 0.00
      early: 0.25
      middle: 0.50
      late: 0.75
      recent: 1.00

# ═══════════════════════════════════════════════════════════════
# Capability profiles — 30-dim defaults per service archetype.
# `register-tools --tier service --site <id> --profile <name>` registers ONE
# entity (the site/service itself) from these defaults, instead of looping
# framework components. Dynamic dims (current_load/health/etc.) are
# daemon-populated and intentionally omitted. Value names MUST match the
# dimension `values:` enums above.
# ═══════════════════════════════════════════════════════════════
profiles:
  # A public-facing web site (e.g. a WordPress site served by gCore).
  web:
    - { name: protocol, value: http_rest }
    - { name: native_format, value: json }
    - { name: api_version, value: v1 }
    - { name: contract_stability, value: stable }
    - { name: clearance_required, value: public }
    - { name: auth_method, value: session_cookie }
    - { name: data_sensitivity, value: internal }
    - { name: service_scope, value: client_facing }
    - { name: domain_primary, value: presentation }
    - { name: domain_secondary, value: content }
    - { name: specialization, value: generalist }
    - { name: throughput_tier, value: standard }
    - { name: latency_class, value: interactive }
    - { name: reliability_tier, value: standard }
    - { name: pipeline_stage, value: deliver }

  # A headless API / BFF (no presentation layer).
  headless:
    - { name: protocol, value: http_rest }
    - { name: native_format, value: json }
    - { name: contract_stability, value: stable }
    - { name: clearance_required, value: authenticated }
    - { name: auth_method, value: bearer_token }
    - { name: data_sensitivity, value: internal }
    - { name: service_scope, value: bff }
    - { name: domain_primary, value: gateway }
    - { name: specialization, value: focused }
    - { name: throughput_tier, value: professional }
    - { name: latency_class, value: responsive }
    - { name: reliability_tier, value: high }
    - { name: pipeline_stage, value: deliver }

  # A generic internal backend service.
  service:
    - { name: protocol, value: gnode_stream }
    - { name: native_format, value: json }
    - { name: contract_stability, value: stable }
    - { name: clearance_required, value: authenticated }
    - { name: auth_method, value: api_key }
    - { name: data_sensitivity, value: internal }
    - { name: service_scope, value: internal_api }
    - { name: domain_primary, value: compute }
    - { name: specialization, value: focused }
    - { name: throughput_tier, value: standard }
    - { name: latency_class, value: responsive }
    - { name: reliability_tier, value: standard }
    - { name: pipeline_stage, value: process }

  # An infrastructure/system daemon.
  system:
    - { name: protocol, value: resp3_direct }
    - { name: native_format, value: resp3 }
    - { name: contract_stability, value: stable }
    - { name: clearance_required, value: privileged }
    - { name: auth_method, value: mtls }
    - { name: data_sensitivity, value: internal }
    - { name: service_scope, value: daemon }
    - { name: domain_primary, value: platform }
    - { name: specialization, value: specialist }
    - { name: throughput_tier, value: professional }
    - { name: latency_class, value: realtime }
    - { name: reliability_tier, value: critical }
    - { name: pipeline_stage, value: process }

  # A background worker / component.
  component:
    - { name: protocol, value: gnode_stream }
    - { name: native_format, value: json }
    - { name: contract_stability, value: stable }
    - { name: clearance_required, value: authenticated }
    - { name: auth_method, value: api_key }
    - { name: data_sensitivity, value: internal }
    - { name: service_scope, value: worker }
    - { name: domain_primary, value: compute }
    - { name: specialization, value: focused }
    - { name: throughput_tier, value: standard }
    - { name: latency_class, value: responsive }
    - { name: reliability_tier, value: standard }
    - { name: pipeline_stage, value: process }
